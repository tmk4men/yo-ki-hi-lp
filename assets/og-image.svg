<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Yo-Ki-Hi pelvis support concept">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f3"/>
      <stop offset="1" stop-color="#f5efe7"/>
    </linearGradient>
    <radialGradient id="blobL" cx="0.18" cy="0.22" r="0.45">
      <stop offset="0" stop-color="#dde6db" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#dde6db" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobR" cx="0.85" cy="0.78" r="0.5">
      <stop offset="0" stop-color="#f1ddd4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f1ddd4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8d4f3f"/>
      <stop offset="1" stop-color="#6f3d2f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#blobL)"/>
  <rect width="1200" height="630" fill="url(#blobR)"/>

  <!-- thin top rule -->
  <rect x="84" y="78" width="1032" height="1" fill="#30251f" opacity="0.18"/>

  <!-- eyebrow -->
  <text x="84" y="118" font-family="Avenir Next, Hiragino Sans, Yu Gothic, sans-serif" font-size="20" letter-spacing="6" fill="#8d4f3f" font-weight="700">PELVIS SUPPORT CONCEPT</text>

  <!-- brand -->
  <text x="84" y="248" font-family="Iowan Old Style, Palatino Linotype, serif" font-size="160" letter-spacing="6" fill="#30251f" font-weight="600">Yo-Ki-Hi</text>

  <!-- jp tagline -->
  <text x="84" y="332" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="42" letter-spacing="3" fill="#30251f" font-weight="600">骨盤を立てて、姿勢の起点を整える。</text>
  <text x="84" y="384" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="24" fill="#6b5e55">理論・検査・装着・使い分け・EMS活用を、1ページで。</text>

  <!-- 4 axes badges -->
  <g font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="28" font-weight="700" fill="#8d4f3f">
    <circle cx="120" cy="492" r="34" fill="none" stroke="#8d4f3f" stroke-width="1.4"/>
    <text x="120" y="502" text-anchor="middle">可</text>
    <circle cx="208" cy="492" r="34" fill="none" stroke="#8d4f3f" stroke-width="1.4"/>
    <text x="208" y="502" text-anchor="middle">体</text>
    <circle cx="296" cy="492" r="34" fill="none" stroke="#8d4f3f" stroke-width="1.4"/>
    <text x="296" y="502" text-anchor="middle">呼</text>
    <circle cx="384" cy="492" r="34" fill="none" stroke="#8d4f3f" stroke-width="1.4"/>
    <text x="384" y="502" text-anchor="middle">美</text>
  </g>

  <!-- right meta -->
  <g font-family="Avenir Next, Hiragino Sans, Yu Gothic, sans-serif">
    <text x="1116" y="118" text-anchor="end" font-size="18" letter-spacing="3" fill="#6b5e55" font-weight="700">FOR PRACTITIONERS</text>
    <text x="1116" y="494" text-anchor="end" font-size="20" fill="#30251f" font-weight="700">治療院・サロン導入支援サイト</text>
    <text x="1116" y="524" text-anchor="end" font-size="16" fill="#6b5e55">セミナー後の共有用 1ページ集約</text>
  </g>

  <!-- bottom rule -->
  <rect x="84" y="552" width="1032" height="1" fill="#30251f" opacity="0.18"/>
</svg>
